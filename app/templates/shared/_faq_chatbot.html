{# FAQ Chatbot Widget — rule-based, no external AI, multilingual #}
<style>
.faq-toggle{position:fixed;bottom:24px;right:24px;z-index:2100;width:56px;height:56px;border-radius:50%;background:#3f4a36;color:#fff;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.18);display:flex;align-items:center;justify-content:center;font-size:24px;transition:transform .2s,background .2s}
.faq-toggle:hover{transform:scale(1.08);background:#19a463}
.faq-toggle .badge-dot{position:absolute;top:6px;right:6px;width:10px;height:10px;background:#f59e0b;border-radius:50%;border:2px solid #fff}
.faq-panel{position:fixed;bottom:90px;right:24px;z-index:2100;width:370px;max-width:calc(100vw - 32px);max-height:520px;background:#fff;border-radius:16px;box-shadow:0 12px 40px rgba(0,0,0,0.15);display:none;flex-direction:column;overflow:hidden;animation:faqSlideUp .25s ease-out}
@keyframes faqSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.faq-header{background:#3f4a36;color:#fff;padding:16px 20px;display:flex;align-items:center;gap:10px}
.faq-header-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
.faq-header-text{flex:1}
.faq-header-text h4{margin:0;font-size:14px;font-weight:700}
.faq-header-text p{margin:0;font-size:11px;opacity:0.8}
.faq-close{background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:4px;opacity:0.7}
.faq-close:hover{opacity:1}
.faq-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}
.faq-msg{max-width:88%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;animation:faqFade .2s ease-out}
@keyframes faqFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.faq-msg.bot{background:#f0f2ec;color:#1f2937;align-self:flex-start;border-bottom-left-radius:4px}
.faq-msg.user{background:#3f4a36;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.faq-buttons{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.faq-btn{background:#fff;border:1px solid #d1d5db;color:#374151;padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;transition:all .15s;font-weight:500}
.faq-btn:hover{border-color:#3f4a36;color:#3f4a36;background:#f0f2ec}
.faq-input-row{padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;gap:8px}
.faq-input{flex:1;border:1px solid #d1d5db;border-radius:20px;padding:8px 14px;font-size:13px;outline:none}
.faq-input:focus{border-color:#3f4a36}
.faq-send{background:#3f4a36;color:#fff;border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}
.faq-send:hover{background:#19a463}
@media(max-width:480px){.faq-panel{bottom:0;right:0;width:100%;max-width:100%;max-height:100vh;border-radius:16px 16px 0 0}.faq-toggle{bottom:16px;right:16px}}
</style>

<button class="faq-toggle" id="faqToggle" title="Help">
  <i class="fas fa-comment-dots"></i>
  <span class="badge-dot" id="faqDot"></span>
</button>

<div class="faq-panel" id="faqPanel">
  <div class="faq-header">
    <div class="faq-header-icon"><i class="fas fa-robot"></i></div>
    <div class="faq-header-text">
      <h4>Human-me Assistant</h4>
      <p id="faqSubtitle"></p>
    </div>
    <button class="faq-close" id="faqClose"><i class="fas fa-times"></i></button>
  </div>
  <div class="faq-body" id="faqBody"></div>
  <div class="faq-input-row">
    <input type="text" class="faq-input" id="faqInput" autocomplete="off">
    <button class="faq-send" id="faqSend"><i class="fas fa-paper-plane"></i></button>
  </div>
</div>

  /* ── Detect language ──────────────────────────────────── */
  function getLang(){
    const c = document.cookie.match(/(?:^|;\s*)lang=([^;]*)/);
    if(c) return c[1];
    const h = document.documentElement.lang;
    if(h && T[h]) return h;
    return 'en';
  }
  function t(){ return T[getLang()] || T.en; }

  /* ── DOM refs ─────────────────────────────────────────── */
  const toggle = document.getElementById('faqToggle');
  const panel  = document.getElementById('faqPanel');
  const body   = document.getElementById('faqBody');
  const input  = document.getElementById('faqInput');
  const send   = document.getElementById('faqSend');
  const close  = document.getElementById('faqClose');
  const dot    = document.getElementById('faqDot');
  const sub    = document.getElementById('faqSubtitle');
  let open = false;

  /* ── Helpers ──────────────────────────────────────────── */
  function addMsg(text, cls){
    const d = document.createElement('div');
    d.className = 'faq-msg ' + cls;
    d.innerHTML = text;
    body.appendChild(d);
    body.scrollTop = body.scrollHeight;
  }

  function addButtons(btns){
    const wrap = document.createElement('div');
    wrap.className = 'faq-buttons';
    btns.forEach(function(b){
      const btn = document.createElement('button');
      btn.className = 'faq-btn';
      btn.textContent = b.label;
      btn.onclick = b.action;
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
    body.scrollTop = body.scrollHeight;
  }

  function showMenu(){
    const lang = t();
    addMsg(lang.welcome, 'bot');
    const btns = Object.keys(lang.cats).map(function(k){
      return { label: lang.cats[k].icon + ' ' + lang.cats[k].label, action: function(){ showCategory(k); } };
    });
    addButtons(btns);
  }

  function showCategory(cat){
    const lang = t();
    const catInfo = lang.cats[cat];
    addMsg(catInfo.label, 'user');
    const questions = lang.qa[cat] || [];
    const btns = questions.map(function(qa){
      return { label: qa[0], action: function(){ showAnswer(qa[0], qa[1]); } };
    });
    btns.push({ label: '← ' + lang.back, action: function(){ body.innerHTML = ''; showMenu(); } });
    addButtons(btns);
  }

  function showAnswer(q, a){
    addMsg(q, 'user');
    setTimeout(function(){ addMsg(a, 'bot'); addBackButton(); }, 200);
  }

  function addBackButton(){
    const lang = t();
    addButtons([{ label: '← ' + lang.back, action: function(){ body.innerHTML = ''; showMenu(); } }]);
  }

  /* ── Keyword search ───────────────────────────────────── */
  function searchFAQ(query){
    const lang = t();
    const q = query.toLowerCase();
    const results = [];
    Object.keys(lang.qa).forEach(function(cat){
      lang.qa[cat].forEach(function(qa){
        if(qa[0].toLowerCase().indexOf(q) >= 0 || qa[1].toLowerCase().indexOf(q) >= 0){
          results.push(qa);
        }
      });
    });
    return results;
  }

  function handleUserInput(){
    const val = input.value.trim();
    if(!val) return;
    input.value = '';
    addMsg(val, 'user');
    const lang = t();
    const results = searchFAQ(val);
    if(results.length > 0){
      if(results.length === 1){
        setTimeout(function(){ addMsg(results[0][1], 'bot'); addBackButton(); }, 200);
      } else {
        const btns = results.slice(0, 5).map(function(qa){
          return { label: qa[0], action: function(){ showAnswer(qa[0], qa[1]); } };
        });
        btns.push({ label: '← ' + lang.back, action: function(){ body.innerHTML = ''; showMenu(); } });
        setTimeout(function(){ addMsg(results.length + ' results found:', 'bot'); addButtons(btns); }, 200);
      }
    } else {
      setTimeout(function(){ addMsg(lang.no_match, 'bot'); addBackButton(); }, 300);
    }
  }

  /* ── Events ───────────────────────────────────────────── */
  toggle.onclick = function(){
    open = !open;
    panel.style.display = open ? 'flex' : 'none';
    dot.style.display = 'none';
    if(open && body.children.length === 0){
      sub.textContent = t().subtitle;
      input.placeholder = t().placeholder;
      showMenu();
    }
  };
  close.onclick = function(){ open = false; panel.style.display = 'none'; };
  send.onclick = handleUserInput;
  input.onkeydown = function(e){ if(e.key === 'Enter') handleUserInput(); };
})();
</script>
