{% extends "base.html" %}
{% block content %}
<div style="max-width:700px;margin:0 auto;padding:20px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h4 class="fw-bold mb-0"><i class="fas fa-comments me-2"></i>{{ _("Chats") }}</h4>
        <a href="{{ url_for(current_user.role + '.dashboard') }}" class="btn btn-sm btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>{{ _("Back") }}
        </a>
    </div>

    <!-- Tabs -->
    <div class="d-flex gap-2 mb-3">
        <button class="btn btn-sm chat-tab active" data-tab="all" onclick="switchChatTab('all')">
            <i class="fas fa-list me-1"></i>{{ _("All") }}
        </button>
        <button class="btn btn-sm chat-tab" data-tab="unread" onclick="switchChatTab('unread')">
            <i class="fas fa-envelope me-1"></i>{{ _("Unread") }}
            <span id="unreadBadge" class="badge bg-success rounded-pill ms-1" style="display:none;"></span>
        </button>
        <button class="btn btn-sm chat-tab" data-tab="important" onclick="switchChatTab('important')">
            <i class="fas fa-star me-1"></i>{{ _("Important") }}
        </button>
    </div>

    <div id="conversationsList">
        <div class="text-center py-5">
            <div class="spinner-border text-secondary" role="status"></div>
        </div>
    </div>
</div>

<style>
    .chat-tab {
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        color: #6b7280;
        border-radius: 20px;
        font-weight: 600;
        font-size: 13px;
        padding: 6px 16px;
        transition: all 0.2s;
    }
    .chat-tab:hover {
        background: #e5e7eb;
        color: #374151;
    }
    .chat-tab.active {
        background: #3f4a36;
        border-color: #3f4a36;
        color: #fff;
    }
    .star-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 16px;
        padding: 4px 6px;
        color: #d1d5db;
        transition: color 0.2s;
    }
    .star-btn:hover, .star-btn.starred {
        color: #f59e0b;
    }
</style>
{% endblock %}

{% block scripts %}
<script>
const currentUserId = {{ current_user.id }};
let activeTab = 'all';
let allConversations = [];

function getImportantChats() {
    try {
        return JSON.parse(localStorage.getItem('importantChats_' + currentUserId) || '[]');
    } catch { return []; }
}

function toggleImportant(userId) {
    let important = getImportantChats();
    const idx = important.indexOf(userId);
    if (idx > -1) {
        important.splice(idx, 1);
    } else {
        important.push(userId);
    }
    localStorage.setItem('importantChats_' + currentUserId, JSON.stringify(important));
    renderConversations();
}

function switchChatTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.chat-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    renderConversations();
}

function renderConversations() {
    const container = document.getElementById('conversationsList');
    const important = getImportantChats();

    let filtered = allConversations;
    if (activeTab === 'unread') {
        filtered = allConversations.filter(c => c.unread > 0);
    } else if (activeTab === 'important') {
        filtered = allConversations.filter(c => important.includes(c.user_id));
    }

    // Update unread badge
    const totalUnread = allConversations.reduce((sum, c) => sum + (c.unread || 0), 0);
    const badge = document.getElementById('unreadBadge');
    if (totalUnread > 0) {
        badge.textContent = totalUnread;
        badge.style.display = '';
    } else {
        badge.style.display = 'none';
    }

    if (!filtered || filtered.length === 0) {
        const emptyMsg = activeTab === 'unread'
            ? '{{ _("No unread messages") }}'
            : activeTab === 'important'
                ? '{{ _("No important chats. Tap the star to mark a chat as important.") }}'
                : '{{ _("No conversations yet") }}';
        const emptyIcon = activeTab === 'unread' ? 'fa-check-double' : activeTab === 'important' ? 'fa-star' : 'fa-comment-slash';
        container.innerHTML = `
            <div class="text-center py-5" style="background:#f8f9fa;border-radius:12px;border:1px dashed #d1d5db;">
                <i class="fas ${emptyIcon} fa-2x mb-3" style="color:#d1d5db;"></i>
                <p class="text-muted mb-0">${emptyMsg}</p>
            </div>`;
        return;
    }

    let html = '';
    filtered.forEach(conv => {
        const isImportant = important.includes(conv.user_id);
        const photo = conv.photo
            ? `<img src="${conv.photo}" class="rounded-circle" style="width:48px;height:48px;object-fit:cover;flex-shrink:0;">`
            : `<div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white fw-bold" style="width:48px;height:48px;flex-shrink:0;font-size:18px;">${(conv.name||'?')[0].toUpperCase()}</div>`;

        const time = new Date(conv.timestamp).toLocaleString('uk-UA', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'});
        const unread = conv.unread > 0 ? `<span class="badge bg-success rounded-pill">${conv.unread}</span>` : '';
        const lastMsg = conv.last_message_type !== 'text'
            ? `<i class="fas fa-paperclip me-1"></i>{{ _("Attachment") }}`
            : (conv.last_message.length > 40 ? conv.last_message.substring(0, 40) + '...' : conv.last_message);

        html += `
        <div class="d-flex align-items-center gap-2 mb-2" style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;transition:0.2s;">
            <a href="/chat/${conv.user_id}" class="d-flex align-items-center gap-3 p-3 text-decoration-none flex-grow-1 min-w-0" style="cursor:pointer;" onmouseover="this.parentElement.style.background='#f9fafb'" onmouseout="this.parentElement.style.background='#fff'">
                ${photo}
                <div class="flex-grow-1 min-w-0">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong class="text-dark">${conv.name}</strong>
                        <small class="text-muted">${time}</small>
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-1">
                        <small class="text-muted text-truncate" style="max-width:80%;">${lastMsg}</small>
                        ${unread}
                    </div>
                </div>
            </a>
            <button class="star-btn ${isImportant ? 'starred' : ''}" onclick="event.stopPropagation();toggleImportant(${conv.user_id})" title="{{ _('Mark as important') }}">
                <i class="fas fa-star"></i>
            </button>
        </div>`;
    });
    container.innerHTML = html;
}

function loadConversations() {
    fetch('/api/conversations').then(r => r.json()).then(conversations => {
        allConversations = conversations || [];
        renderConversations();
    });
}

document.addEventListener('DOMContentLoaded', () => {
    loadConversations();
    setInterval(loadConversations, 10000);
});
</script>
{% endblock %}
