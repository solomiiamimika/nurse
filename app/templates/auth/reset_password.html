<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <title>{{ _("New Password") }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      :root { --primary-green:#3f4a36; --primary-hover:#19a463; --text-dark:#404145; --bg-pink:#fff0f3; }
      body { font-family:"Macan",system-ui,-apple-system,sans-serif; background:linear-gradient(180deg,#fff0f3,#fff); height:100vh; display:flex; align-items:center; justify-content:center; margin:0; }
      body::before { content:""; position:fixed; inset:0; background-image:url('https://www.transparenttextures.com/patterns/cubes.png'); opacity:.4; pointer-events:none; z-index:-1; }
      .auth-card { background:#fff; width:100%; max-width:450px; padding:40px; border-radius:20px; box-shadow:0 15px 40px rgba(63,74,54,.08); text-align:center; animation:fadeIn .5s ease-out; }
      @keyframes fadeIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
      h1 { color:var(--text-dark); font-weight:800; margin-bottom:10px; font-size:1.8rem; }
      .subtitle { color:#6c757d; margin-bottom:30px; font-size:.92rem; }
      .input-group-custom { position:relative; margin-bottom:15px; text-align:left; }
      .input-group-custom i { position:absolute; left:15px; top:50%; transform:translateY(-50%); color:#9ca3af; z-index:2; pointer-events:none; }
      .styled-input { width:100%; height:50px; padding:0 15px 0 45px!important; background:#f8f9fa; border:1px solid transparent; border-radius:10px; font-size:1rem; color:var(--text-dark); outline:none; transition:.2s; }
      .styled-input:focus { background:#fff; border-color:var(--primary-green); box-shadow:0 0 0 3px rgba(63,74,54,.1); }
      .btn-submit { width:100%; background:var(--primary-green); color:#fff; height:50px; border:none; border-radius:10px; font-size:1.1rem; font-weight:700; cursor:pointer; transition:.2s; margin-top:10px; }
      .btn-submit:hover { background:var(--primary-hover); transform:translateY(-2px); box-shadow:0 5px 15px rgba(63,74,54,.2); }
      .alert { border-radius:10px; font-size:.9rem; text-align:left; margin-bottom:20px; padding:10px 15px; }
      .back-link { display:inline-flex; align-items:center; gap:6px; color:#6c757d; text-decoration:none; font-size:.9rem; margin-top:20px; }
      .back-link:hover { color:var(--primary-green); }
    </style>
  </head>
  <body>
    <div class="auth-card">
      <h1><i class="fas fa-lock-open" style="font-size:1.5rem;color:var(--primary-green);"></i></h1>
      <h1>{{ _("Set New Password") }}</h1>
      <p class="subtitle">{{ _("Choose a strong password (at least 8 characters).") }}</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
      {% endwith %}

      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

        <div class="input-group-custom">
          <i class="fas fa-lock"></i>
          <input type="password" name="new_password" class="styled-input" placeholder="{{ _('New password') }}" minlength="8" required />
        </div>

        <div class="input-group-custom">
          <i class="fas fa-check-double"></i>
          <input type="password" name="confirm_password" class="styled-input" placeholder="{{ _('Confirm password') }}" minlength="8" required />
        </div>

        <button type="submit" class="btn-submit">
          <i class="fas fa-save me-2"></i>{{ _("Reset Password") }}
        </button>
      </form>

      <a href="{{ url_for('auth.login') }}" class="back-link">
        <i class="fas fa-arrow-left"></i> {{ _("Back to Login") }}
      </a>
    </div>
  </body>
</html>
