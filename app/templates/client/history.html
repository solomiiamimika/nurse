{% extends "base.html" %}
{% block content %}

<div class="client-dashboard" style="padding-top: 40px;">

  <div class="d-flex justify-content-between align-items-center mb-4" style="max-width:900px;margin:0 auto;">
    <div>
        <h2 style="margin-bottom: 5px;"><i class="fas fa-clock-rotate-left me-2"></i>{{ _("History") }}</h2>
        <span class="text-muted">{{ _("Your completed and past services") }}</span>
    </div>
    <a href="{{ url_for('client.dashboard') }}" class="btn-tool">
      <i class="fas fa-arrow-left"></i> {{ _("Back to Dashboard") }}
    </a>
  </div>

  <div style="max-width:900px;margin:0 auto;">

    <!-- Tabs -->
    <div class="nav nav-pills nav-fill p-1 bg-white border rounded-pill mb-3 shadow-sm" role="tablist">
      <button class="nav-link rounded-pill active fw-bold small py-2" id="htab-appointments" onclick="switchHistoryTab('appointments')">
        <i class="fas fa-calendar-check me-1"></i>{{ _("Services") }}
      </button>
      <button class="nav-link rounded-pill fw-bold small py-2" id="htab-requests" onclick="switchHistoryTab('requests')">
        <i class="fas fa-clipboard-list me-1"></i>{{ _("Requests") }}
      </button>
    </div>

    <!-- Tab 1: Appointments (services) -->
    <div id="appointmentsHistoryContent">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
      </div>
    </div>

    <!-- Tab 2: Requests -->
    <div id="requestsHistoryContent" class="d-none">
      <div class="text-center py-4">
        <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
      </div>
    </div>

  </div>
</div>

{% endblock %}

{% block scripts %}
<script>
  window.switchHistoryTab = function(mode) {
      document.getElementById('htab-appointments').classList.toggle('active', mode === 'appointments');
      document.getElementById('htab-requests').classList.toggle('active', mode === 'requests');
      document.getElementById('appointmentsHistoryContent').classList.toggle('d-none', mode !== 'appointments');
      document.getElementById('requestsHistoryContent').classList.toggle('d-none', mode !== 'requests');
  };

  function getStatusBadge(status) {
      const map = {
          'completed': { bg: '#10b981', text: '{{ _("Completed") }}' },
          'confirmed_paid': { bg: '#22c55e', text: '{{ _("Paid") }}' },
          'cancelled': { bg: '#ef4444', text: '{{ _("Cancelled") }}' },
          'work_submitted': { bg: '#3b82f6', text: '{{ _("Work submitted") }}' },
      };
      const info = map[status] || { bg: '#6b7280', text: status };
      return `<span class="badge" style="background:${info.bg};color:#fff;height:fit-content;">${info.text}</span>`;
  }

  function loadHistory() {
      fetch('/client/client_get_history')
        .then(r => r.json())
        .then(data => {
            if (!data.success) return;

            // Render appointments
            const appoContainer = document.getElementById('appointmentsHistoryContent');
            if (data.appointments.length === 0) {
                appoContainer.innerHTML = `
                <div class="text-center py-5 text-muted" style="background:#f8f9fa;border-radius:12px;border:1px dashed #d1d5db;">
                    <i class="fas fa-calendar fa-2x mb-3" style="color:#d1d5db;"></i>
                    <p class="mb-0">{{ _("No completed services yet") }}</p>
                </div>`;
            } else {
                let html = '';
                data.appointments.forEach(a => {
                    const date = a.appointment_time ? new Date(a.appointment_time).toLocaleString('uk-UA', {day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                    const borderColor = a.status === 'cancelled' ? '#ef4444' : '#10b981';
                    html += `
                    <div class="card mb-2" style="border-left:4px solid ${borderColor};">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong>${a.service_name}</strong>
                                    <div class="small text-muted mt-1"><i class="fas fa-user-md me-1"></i>${a.provider_name}</div>
                                </div>
                                ${getStatusBadge(a.status)}
                            </div>
                            <div class="small text-muted mt-2"><i class="fas fa-clock me-1"></i>${date}</div>
                            ${a.notes ? `<div class="small text-muted mt-1 fst-italic">${a.notes}</div>` : ''}
                        </div>
                    </div>`;
                });
                appoContainer.innerHTML = html;
            }

            // Render requests
            const reqContainer = document.getElementById('requestsHistoryContent');
            if (data.requests.length === 0) {
                reqContainer.innerHTML = `
                <div class="text-center py-5 text-muted" style="background:#f8f9fa;border-radius:12px;border:1px dashed #d1d5db;">
                    <i class="fas fa-clipboard-list fa-2x mb-3" style="color:#d1d5db;"></i>
                    <p class="mb-0">{{ _("No past requests") }}</p>
                </div>`;
            } else {
                let html = '';
                data.requests.forEach(r => {
                    const date = r.appointment_start_time ? new Date(r.appointment_start_time).toLocaleString('uk-UA', {day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'}) : '';
                    const created = r.created_appo ? new Date(r.created_appo).toLocaleDateString('uk-UA', {day:'numeric', month:'long', year:'numeric'}) : '';
                    const borderColor = r.status === 'cancelled' ? '#ef4444' : '#10b981';
                    html += `
                    <div class="card mb-2" style="border-left:4px solid ${borderColor};">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong>${r.service_name}</strong>
                                    ${r.provider_name ? `<div class="small text-muted mt-1"><i class="fas fa-user-md me-1"></i>${r.provider_name}</div>` : ''}
                                </div>
                                ${getStatusBadge(r.status)}
                            </div>
                            <div class="d-flex gap-3 mt-2">
                                <div class="small text-muted"><i class="fas fa-clock me-1"></i>${date}</div>
                                ${r.payment ? `<div class="small text-success fw-bold">${r.payment}</div>` : ''}
                            </div>
                            ${created ? `<div class="small text-muted mt-1">{{ _("Created") }}: ${created}</div>` : ''}
                        </div>
                    </div>`;
                });
                reqContainer.innerHTML = html;
            }
        });
  }

  document.addEventListener('DOMContentLoaded', loadHistory);
</script>
{% endblock %}
