name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/human-me.com/nurse
            git pull origin main
            /var/www/human-me.com/venv/bin/pip install -r requirements.txt --quiet
            /var/www/human-me.com/venv/bin/pybabel compile -d translations
            systemctl restart gunicorn.service
